name: Daily Commit

on:
  schedule:
    # 3 times per day (UTC) through 2030-12-30 (enforced in daily_commit/commit.py)
    # 04:00 UTC = 09:30 IST | 12:00 UTC = 17:30 IST | 20:00 UTC = 01:30 IST
    - cron: "0 4 * * *"
    - cron: "0 12 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BRANCH: main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          check-latest: true

      - name: Create daily commit and push
        env:
          # Use your GitHub identity so commits count on your contribution graph.
          # Email must be verified on https://github.com/settings/emails
          GIT_AUTHOR_NAME: abhipattnaik
          GIT_AUTHOR_EMAIL: 82272545+abhipattnaik@users.noreply.github.com
          GIT_COMMITTER_NAME: abhipattnaik
          GIT_COMMITTER_EMAIL: 82272545+abhipattnaik@users.noreply.github.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          python -m daily_commit ci --branch "$BRANCH"